[package]
name = "lib-infrastructure-persistence"
version = "0.1.0"
authors.workspace = true
edition.workspace = true

[features]
mobc-sqlx = ["dep:mobc-sqlx"]
sqlx = ["dep:sqlx", "mobc-sqlx"]
redis = ["dep:redis"]

[dependencies]
domain = { path = "../../domain", package = "lib-domain" }
application = { path = "../../application", package = "lib-application" }
sqlx = { path = "./sqlx", package = "lib-infrastructure-persistence-sqlx", optional = true }
redis = { path = "./redis", package = "lib-infrastructure-persistence-redis", optional = true }

derive-where.workspace = true
entrait.workspace = true
mobc.workspace = true
mobc-sqlx = { workspace = true, optional = true }
pastey.workspace = true

[lints]
workspace = true
